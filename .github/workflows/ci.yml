name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          # tests/setup.ts sets JWT_SECRET and DATABASE_URL for the test environment.
          # All external services (DB, AI, Stripe, Razorpay) are mocked in tests.
          # BCRYPT_ROUNDS=4 avoids 12-round bcrypt delays in login/register tests (Story 6.5).
          BCRYPT_ROUNDS: "4"
          OPENROUTER_API_KEY: dummy-for-tests
          STRIPE_SECRET_KEY: dummy-for-tests
          STRIPE_WEBHOOK_SECRET: dummy-for-tests
          RAZORPAY_KEY_ID: dummy-for-tests
          RAZORPAY_KEY_SECRET: dummy-for-tests
          RAZORPAY_PLAN_ID: dummy-for-tests
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  build:
    name: Production build check
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
